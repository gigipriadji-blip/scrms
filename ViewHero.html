<div class="tab-pane fade show active" id="heroPage">
  <div class="pc-card mb-4 border-top border-danger border-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h4 class="mb-1 fw-bold text-dark"><i class="fa-solid fa-fire text-danger me-2"></i>Monitoring Artikel Hero</h4>
        <span class="text-muted small">Target dihitung dari total stok artikel (akumulasi semua size).</span>
      </div>
      <div>
        <span class="badge bg-light text-dark border px-3 py-2 fs-6">Target Ketahanan Aman: <strong class="text-danger" id="displayBufferHero">- Hari</strong></span>
      </div>
    </div>
    
    <div class="row g-3 mb-4">
      <div class="col-md-4"><div class="recap-card bg-gradient-primary"><div class="d-flex justify-content-between align-items-center"><div><h6 class="mb-1 text-white-50 text-uppercase fw-bold">Total Hero</h6><h2 class="mb-0 fw-bold" id="heroCountTotal">0</h2></div><i class="fa-solid fa-crown fa-3x opacity-50"></i></div></div></div>
      <div class="col-md-4"><div class="recap-card bg-gradient-danger"><div class="d-flex justify-content-between align-items-center"><div><h6 class="mb-1 text-white-50 text-uppercase fw-bold">Status Kritis</h6><h2 class="mb-0 fw-bold" id="heroCountKritis">0</h2></div><i class="fa-solid fa-triangle-exclamation fa-3x opacity-50"></i></div></div></div>
      <div class="col-md-4"><div class="recap-card bg-gradient-success"><div class="d-flex justify-content-between align-items-center"><div><h6 class="mb-1 text-white-50 text-uppercase fw-bold">Status Aman</h6><h2 class="mb-0 fw-bold" id="heroCountAman">0</h2></div><i class="fa-solid fa-check-circle fa-3x opacity-50"></i></div></div></div>
    </div>

    <div class="row g-3 mb-4">
      <div class="col-md-8">
        <div class="input-group input-group-lg">
          <span class="input-group-text bg-light border-end-0" style="border-color: #dee2e6;"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
          <input type="text" id="searchHero" class="form-control border-start-0 border-end-0" placeholder="Cari nama artikel hero..." onkeyup="filterHeroAlert()">
          <button class="btn bg-light border border-start-0 text-muted" type="button" id="btnClearSearchHero" onclick="clearSearchHero()" style="display: none; border-color: #dee2e6; z-index: 4;">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
      </div>
      <div class="col-md-4">
        <select id="filterKategoriHero" class="form-select form-select-lg" onchange="renderHeroAlert()">
          <option value="">-- Semua Kategori Hero --</option>
        </select>
      </div>
    </div>
    
    <div class="table-responsive">
      <table class="table align-middle table-hover table-master border">
        <thead>
          <tr>
            <th width="20%">Artikel & SKU</th>
            <th width="10%">Warna</th>
            <th width="12%" class="text-center">Total Stok</th>
            <th width="22%">ADS Global & Selisih</th>
            <th width="10%" class="text-center">Ketahanan</th>
            <th width="11%" class="text-center">Status</th>
            <th width="15%" class="text-center">Update Terakhir</th>
          </tr>
        </thead>
        <tbody id="heroAlertBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  function filterHeroAlert() {
    var input = document.getElementById('searchHero');
    var btn = document.getElementById('btnClearSearchHero');
    if (btn) {
      if (input && input.value.trim() !== "") {
        btn.style.setProperty('display', 'block', 'important');
      } else {
        btn.style.setProperty('display', 'none', 'important');
      }
    }
    renderHeroAlert();
  }

  function clearSearchHero() {
    var input = document.getElementById('searchHero');
    if (input) {
      input.value = "";
      input.focus();
    }
    var btn = document.getElementById('btnClearSearchHero');
    if (btn) btn.style.setProperty('display', 'none', 'important');
    renderHeroAlert();
  }

  function renderHeroAlert() {
    var tbody = document.getElementById('heroAlertBody');
    if(!tbody) return;
    
    var elDisp = document.getElementById('displayBufferHero');
    var elInput = document.getElementById('inputBufferHero');
    if (elDisp) {
      var heroDays = (elInput && elInput.value) ? elInput.value : 14;
      elDisp.innerText = heroDays + " Hari";
    }

    var searchInput = document.getElementById('searchHero');
    var searchHero = searchInput ? searchInput.value.toLowerCase() : "";
    
    var katInput = document.getElementById('filterKategoriHero');
    var katFilterHero = katInput ? katInput.value : "";
    
    var bufferInput = document.getElementById('inputBufferHero');
    var targetHari = bufferInput ? (parseFloat(bufferInput.value) || 14) : 14;
    
    var html = ""; var countTotal = 0; var countAman = 0; var countKritis = 0;

    var groupedData = {};
    
    globalData.forEach(function(item) {
      if (!item) return;
      var sku = item.sku;
      
      if (!groupedData[sku]) {
        groupedData[sku] = {
          kategori: item.kategori,
          sku: sku,
          nama: item.nama,
          warna: item.warna,
          status: item.status,
          isAktif: item.isAktif,
          adsGlobal: parseFloat(item.adsGlobal) || 0,
          totalQty: 0,
          latestTimestamp: "-",
          sizes: []
        };
      }
      
      groupedData[sku].totalQty += parseInt(item.qty) || 0;
      groupedData[sku].sizes.push({ tren: item.tren });
      
      if (item.timestamp && item.timestamp !== "-") {
        if (groupedData[sku].latestTimestamp === "-") {
          groupedData[sku].latestTimestamp = item.timestamp;
        } else {
          var curParts = item.timestamp.split(" ");
          var maxParts = groupedData[sku].latestTimestamp.split(" ");
          if (curParts.length >= 2 && maxParts.length >= 2) {
            var curDateArr = curParts[0].split("/");
            var maxDateArr = maxParts[0].split("/");
            var curScore = curDateArr[2] + curDateArr[1] + curDateArr[0] + curParts[1].replace(":", "");
            var maxScore = maxDateArr[2] + maxDateArr[1] + maxDateArr[0] + maxParts[1].replace(":", "");
            if (parseInt(curScore) > parseInt(maxScore)) {
              groupedData[sku].latestTimestamp = item.timestamp;
            }
          }
        }
      }
    });

    var heroArticles = Object.values(groupedData).filter(function(item) {
      var isHero = item.isAktif === "Aktif" && item.adsGlobal > 0;
      var matchSearch = item.nama.toLowerCase().includes(searchHero) || item.sku.toLowerCase().includes(searchHero);
      var matchKat = (katFilterHero === "") || (item.kategori === katFilterHero);
      return isHero && matchSearch && matchKat;
    });

    if(heroArticles.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted"><i class="fa-solid fa-box-open fa-2x mb-2"></i><br>Tidak ada data Hero Alert saat ini.</td></tr>';
      if(document.getElementById('heroCountTotal')) document.getElementById('heroCountTotal').innerText = "0";
      if(document.getElementById('heroCountAman')) document.getElementById('heroCountAman').innerText = "0";
      if(document.getElementById('heroCountKritis')) document.getElementById('heroCountKritis').innerText = "0";
      return;
    }

    var groupedByCategory = {};
    heroArticles.forEach(function(art) { 
      if(!groupedByCategory[art.kategori]) groupedByCategory[art.kategori] = []; 
      groupedByCategory[art.kategori].push(art); 
    });

    Object.keys(groupedByCategory).sort().forEach(function(kategori) {
      html += `<tr><td colspan="7" class="bg-light text-dark fw-bold text-uppercase border-bottom"><i class="fa-solid fa-tags me-2 text-primary"></i>Kategori: ${kategori}</td></tr>`;
      groupedByCategory[kategori].forEach(function(art) {
        countTotal++;
        var curQty = art.totalQty;
        var curAds = art.adsGlobal;
        
        var estimasiHari = curAds > 0 ? Math.floor(curQty / curAds) : 0;
        var isKritis = estimasiHari < targetHari;
        if(isKritis) countKritis++; else countAman++;
        
        var targetStokAman = curAds * targetHari;
        var selisih = curQty - targetStokAman; 
        
        var rowClass = isKritis ? 'row-hero-kritis' : 'row-hero-aman';
        var textStyle = isKritis ? 'kritis-text' : 'fw-bold text-success';
        var iconStatus = isKritis ? '<i class="fa-solid fa-triangle-exclamation text-danger"></i> Kritis' : '<i class="fa-solid fa-check-circle text-success"></i> Aman';
        
        var trendIcon = '';
        if(art.sizes && Array.isArray(art.sizes)) {
          var hasUp = art.sizes.some(s => s.tren === '▲'); 
          var hasDown = art.sizes.some(s => s.tren === '▼');
          if(hasUp && !hasDown) trendIcon = '<i class="fa-solid fa-arrow-trend-up text-success ms-2 fs-5"></i>';
          else if(hasDown && !hasUp) trendIcon = '<i class="fa-solid fa-arrow-trend-down text-danger ms-2 fs-5"></i>';
          else if(hasUp && hasDown) trendIcon = '<i class="fa-solid fa-arrows-up-down text-warning ms-2 fs-5"></i>';
        }
        
        var badgeSelisih = selisih < 0 
          ? `<span class="badge bg-danger ms-3" style="font-size: 0.8rem;"><i class="fa-solid fa-minus me-1"></i>${Math.abs(selisih)} pcs</span>` 
          : `<span class="badge bg-success ms-3" style="font-size: 0.8rem;"><i class="fa-solid fa-plus me-1"></i>+${selisih} pcs</span>`;

        var tglStr = "-", jamStr = "-";
        if(art.latestTimestamp && art.latestTimestamp !== "-") {
          var spl = art.latestTimestamp.split(" ");
          if(spl.length >= 2) { tglStr = spl[0]; jamStr = spl[1]; } else { tglStr = art.latestTimestamp; }
        }

        html += `
          <tr class="${rowClass}">
            <td class="ps-3"><div class="fw-bold fs-6 text-dark">${art.nama}</div><div class="small text-muted font-monospace">${art.sku}</div></td>
            <td><span class="badge bg-white text-dark border p-2">${art.warna || '-'}</span></td>
            <td class="text-center fw-bold fs-4">${curQty} ${trendIcon}</td>
            <td class="align-middle"><div class="d-flex align-items-center"><div class="text-primary fw-bold fs-5">${curAds} <span class="small fw-normal text-muted">/hr</span></div>${badgeSelisih}</div></td>
            <td class="text-center ${textStyle} fs-5">${estimasiHari} Hr</td>
            <td class="text-center fw-bold">${iconStatus}</td>
            <td class="text-center align-middle">
              <div class="d-inline-flex align-items-center gap-2 px-2 py-1 bg-light rounded border text-nowrap" style="font-size: 0.85rem;">
                <span class="text-dark fw-bold"><i class="fa-regular fa-calendar-check text-muted me-1"></i>${tglStr}</span>
                <span class="text-muted">|</span>
                <span class="text-primary fw-bold"><i class="fa-regular fa-clock text-muted me-1"></i>${jamStr}</span>
              </div>
            </td>
          </tr>
        `;
      });
    });
    
    tbody.innerHTML = html;
    if(document.getElementById('heroCountTotal')) document.getElementById('heroCountTotal').innerText = countTotal;
    if(document.getElementById('heroCountAman')) document.getElementById('heroCountAman').innerText = countAman;
    if(document.getElementById('heroCountKritis')) document.getElementById('heroCountKritis').innerText = countKritis;
  }
</script>
