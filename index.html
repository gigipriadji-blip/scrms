<script>
  // Fungsi untuk memuat file HTML dari GitHub ke dalam wadah
  function loadPage(pageName, targetId) {
    fetch(pageName + '.html')
      .then(response => response.text())
      .then(html => {
        document.getElementById(targetId).innerHTML = html;
        // Jika yang dimuat adalah halaman ViewHero, langsung ambil data dari Google
        if(pageName === 'ViewHero') {
          ambilDataDariGoogle();
        }
      })
      .catch(err => console.error("Gagal memuat halaman: ", err));
  }

  // Panggil dan muat halaman saat aplikasi pertama kali dibuka
  loadPage('ViewHero', 'content-Hero');
  loadPage('ViewVendor', 'content-Vendor');

  // Fungsi utama untuk mengambil data dari Google Sheets
  function ambilDataDariGoogle() {
    var urlWebApp = "https://script.google.com/macros/s/AKfycbw6TtxOYys3TWyjWmaeAORVyDCr87l9m8fPd0twqiK_gF1N3CxOIF6NGpWsXbARa786/exec";
    
    fetch(urlWebApp)
      .then(res => res.json())
      .then(data => {
        console.log("Data sukses diambil dari Google Sheets:", data);
        
        // KODE PENTING: Di sini Anda bisa memasukkan logika untuk 
        // menampilkan data ke tabel atau elemen di ViewHero Anda.
        // Contoh: menampilkan jumlah baris data di konsol browser.
      })
      .catch(err => console.error("Gagal mengambil data dari Google:", err));
  }
</script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script>
    var globalData = [];
    var listKategoriGlobal = []; 
    var activeCategory = ""; 
    var groupedMaster = [];
    var GLOBAL_VENDOR_BUFFER = 7; // FIX: Penyelamat angka batas aman vendor

    var APP_ROLE_MODE = "<?!= roleMode ?>";
    var TARGET_VENDOR_USER = "<?!= targetVendorUser ?>";
    var WEB_APP_BASE_URL = "";

    window.addEventListener('DOMContentLoaded', function() {
      google.script.run.withSuccessHandler(function(url) {
        WEB_APP_BASE_URL = url;
      }).getWebAppUrl();

      // PROTEKSI VENDOR & FIX BLANK PAGE
      if (APP_ROLE_MODE === "vendor") {
        document.querySelectorAll('.menu-internal').forEach(el => el.remove());
        
        var pHe = document.getElementById('heroPage'); if(pHe) pHe.remove();
        var pMa = document.getElementById('masterPage'); if(pMa) pMa.remove();
        var pMg = document.getElementById('managePage'); if(pMg) pMg.remove();
        var pVm = document.getElementById('vendorManagePage'); if(pVm) pVm.remove();
        var pVn = document.getElementById('vendorMonitorPage'); if(pVn) pVn.remove();
       
        var welcomeHeader = document.getElementById('vendorWelcomeHeader');
        if(welcomeHeader) welcomeHeader.classList.remove('d-none');
        
        // FIX UTAMA: Paksa dashPage muncul tanpa mencari tombol tab yang sudah dihapus
        var dashPage = document.getElementById('dashPage');
        if(dashPage) dashPage.classList.add('show', 'active');
      }
      
      loadDashboardData(); 
    });

    function loadDashboardData() {
      var artContainer = document.getElementById('articlesContainer');
      if(artContainer) artContainer.innerHTML = '<div class="text-center py-5 text-muted"><i class="fa-solid fa-spinner fa-spin fa-3x mb-3"></i>Menyusun data katalog...</div>';

      google.script.run.withSuccessHandler(function(response) {
        // Fix Struktur Data Baru
        globalData = response.articles || [];
        // Simpan patokan hari ke memori agar tidak hilang
        GLOBAL_VENDOR_BUFFER = (response.settings && response.settings.vendor) ? response.settings.vendor : 7;
        
        var elHero = document.getElementById('inputBufferHero');
        if(elHero) elHero.value = response.settings.hero;
        var elVendor = document.getElementById('inputBufferVendor');
        if(elVendor) elVendor.value = response.settings.vendor;
        
        if(typeof updateUITextBuffers === "function") updateUITextBuffers(); 
        
        if(APP_ROLE_MODE === "vendor" && TARGET_VENDOR_USER !== "") {
          google.script.run.withSuccessHandler(function(vendorList) {
            var match = vendorList.find(v => v.username === TARGET_VENDOR_USER);
            if(match) {
              var txtWelcome = document.getElementById('txtNamaVendorWelcome');
              if(txtWelcome) txtWelcome.innerText = match.nama.toUpperCase();

              // Mencegah error jika terketik spasi pada hak akses di DB
              listKategoriGlobal = match.akses.map(k => k.trim()).sort();
              globalData = globalData.filter(item => listKategoriGlobal.includes(item.kategori));

              var prioToggle = document.getElementById('filterPrioOnly');
              if(prioToggle) prioToggle.checked = true;
              
              if(typeof buildCategoryTabs === "function") buildCategoryTabs(listKategoriGlobal);
            } else {
              if(artContainer) artContainer.innerHTML = '<div class="alert alert-danger">Tautan Vendor Tidak Valid atau Akun Telah Dinonaktifkan.</div>';
            }
          }).readVendorData();
        } else {
          var catSet = new Set();
          globalData.forEach(item => { if(item.isAktif === "Aktif") catSet.add(item.kategori); });
          listKategoriGlobal = Array.from(catSet).sort();
          
          if(typeof prepareMasterCatalogData === "function") prepareMasterCatalogData();
          if(typeof buildCategoryTabs === "function") buildCategoryTabs(listKategoriGlobal); 
          if(typeof buildKategoriDropdown === "function") buildKategoriDropdown(); 
          if(typeof buildMasterCategoryDropdown === "function") buildMasterCategoryDropdown();
          
          if(typeof renderHeroAlert === "function") renderHeroAlert();
          if(typeof renderCards === "function") renderCards();     
          
          if(typeof inisialisasiCheckboxAksesVendor === "function") inisialisasiCheckboxAksesVendor();
          if(typeof renderVendorManageTable === "function") renderVendorManageTable();
          if(typeof inisialisasiDropdownMonitorVendor === "function") inisialisasiDropdownMonitorVendor();
        }
      }).readData();
    }
  </script>
</body>
