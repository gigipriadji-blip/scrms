<body>

  <nav class="navbar navbar-dark bg-dark">

  <div class="container-fluid px-4 mt-4">
    <div id="vendorWelcomeHeader" class="d-none mb-3 p-3 bg-light border-start border-primary border-4 rounded shadow-sm">
      <div class="d-flex align-items-center">

        <div>
          <h6 class="mb-0 fw-bold text-muted">Selamat Datang di Portal Supply Chain</h6>
          <h4 class="mb-0 fw-bold text-dark" id="txtNamaVendorWelcome">-</h4>
        </div>
      </div>

    <ul class="nav nav-tabs mb-4 pb-1 border-bottom border-2" id="mainTabs" role="tablist" style="font-size: 0.95rem;">
      <li class="nav-item menu-internal"><button class="nav-link active" id="hero-tab" data-bs-toggle="tab" data-bs-target="#heroPage" type="button"><i class="fa-solid fa-triangle-exclamation text-danger me-2"></i>Hero Alert (Internal)</button></li>
      <li class="nav-item menu-internal"><button class="nav-link" id="dash-tab" data-bs-toggle="tab" data-bs-target="#dashPage" type="button"><i class="fa-solid fa-mobile-screen me-2 text-primary"></i>Vendor Display</button></li>
      <li class="nav-item menu-internal"><button class="nav-link" id="master-tab" data-bs-toggle="tab" data-bs-target="#masterPage" type="button"><i class="fa-solid fa-book-open me-2 text-success"></i>Master Katalog</button></li>
      <li class="nav-item menu-internal"><button class="nav-link" id="manage-tab" data-bs-toggle="tab" data-bs-target="#masterPage" type="button"><i class="fa-solid fa-sliders me-2 text-warning"></i>Manajemen Stok</button></li>
      <li class="nav-item menu-internal"><button class="nav-link" id="vendor-manage-tab" data-bs-toggle="tab" data-bs-target="#vendorManagePage" type="button"><i class="fa-solid fa-users me-2 text-secondary"></i>Manajemen Vendor</button></li>
      <li class="nav-item menu-internal"><button class="nav-link" id="vendor-monitor-tab" data-bs-toggle="tab" data-bs-target="#vendorMonitorPage" type="button"><i class="fa-solid fa-chalkboard-user me-2 text-info"></i>Monitor Vendor</button></li>

    <div class="tab-content">
      <div id="content-Hero" class="tab-pane active"></div>
      <div id="content-Vendor" class="tab-pane"></div>
    </div>

    <script>
      // Variabel Global Utama Aplikasi
      var globalData = [];
      var listKategoriGlobal = []; 
      var activeCategory = ""; 
      var groupedMaster = [];
      var GLOBAL_VENDOR_BUFFER = 7; 

      var APP_ROLE_MODE = "<?!= roleMode ?>";
      var TARGET_VENDOR_USER = "<?!= targetVendorUser ?>";
      var WEB_APP_BASE_URL = "";

      // Fungsi modular pemuat halaman HTML eksternal menggunakan Promise
      function loadPage(pageName, targetId) {
        return fetch(pageName + '.html')
          .then(response => response.text())
          .then(html => {
            var el = document.getElementById(targetId);
            if(el) el.innerHTML = html;
          })
          .catch(err => console.error("Gagal memuat komponen halaman: " + pageName, err));
      }

      // Menggunakan JSONP untuk menembus proteksi CORS Google secara aman
      function ambilDataDariGoogle() {
        var urlWebApp = "https://script.google.com/macros/s/AKfycbwSvzVtT4Xrl01yVfY_05_VY45zRv3KWADNpt2x7YBnNJ1aa483TsWdYO9--TnSYt79/exec?callback=handleGoogleSheetsData";
        
        var script = document.createElement('script');
        script.src = urlWebApp;
        document.body.appendChild(script);
      }

      // Fungsi penampung data yang dipanggil otomatis oleh JSONP setelah data sukses didapat
      function handleGoogleSheetsData(data) {
        if (data.error) {
          console.error("Gagal mengambil data dari Google:", data.error);
          return;
        }
        console.log("Data sukses diambil dari Google Sheets via JSONP:", data);
        globalData = data; 
        loadDashboardData();
      }
    </script>
  </div>

  <?!= include('ViewMaster_Modal'); ?>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script>
    // Antrean Sinkronisasi: Tunggu semua HTML siap nempel, baru ambil data dari Google Sheets
    window.addEventListener('DOMContentLoaded', function() {
      Promise.all([
        loadPage('ViewHero', 'content-Hero'),
        loadPage('ViewVendor', 'content-Vendor')
      ]).then(function() {
        console.log("Semua komponen tampilan HTML siap. Memulai penarikan data...");
        
        // Pemicu proteksi tampilan khusus jika masuk sebagai Vendor
        if (APP_ROLE_MODE === "vendor") {
            document.querySelectorAll('.menu-internal').forEach(el => el.remove());
            
            var pHe = document.getElementById('heroPage'); if(pHe) pHe.remove();
            var pMa = document.getElementById('masterPage'); if(pMa) pMa.remove();
            var pMg = document.getElementById('managePage'); if(pMg) pMg.remove();
            var pVm = document.getElementById('vendorManagePage'); if(pVm) pVm.remove();
            var pVn = document.getElementById('vendorMonitorPage'); if(pVn) pVn.remove();
            
            var welcomeHeader = document.getElementById('vendorWelcomeHeader');
            if(welcomeHeader) welcomeHeader.classList.remove('d-none');
            
            var dashPage = document.getElementById('dashPage');
            if(dashPage) dashPage.classList.add('show', 'active');
        }
        
        // Eksekusi utama penarikan data
        ambilDataDariGoogle();
      });
    });

    // Fungsi pemroses dan pemeta variabel dashboard utama
    function loadDashboardData() {
        var artContainer = document.getElementById('articlesContainer');
        if(artContainer) artContainer.innerHTML = '<div class="text-center py-5 text-muted"><i class="fa-solid fa-spinner fa-spin fa-3x mb-3"></i>Menyusun data katalog...</div>';

        if (globalData && globalData.length > 1) {
            var headers = globalData[0];
            var rows = globalData.slice(1);
            
            var articles = rows.map(function(row) {
                var obj = {};
                headers.forEach(function(header, index) {
                    var rawKey = header.toString().trim();
                    
                    // PEMETAAN VARIABEL SESUAI FORMAT YANG DIBUTUHKAN VIEWHERO
                    if (rawKey === "Kode Artikel") {
                        obj["sku"] = row[index];
                    } else if (rawKey === "Nama Artikel") {
                        obj["nama"] = row[index];
                    } else if (rawKey === "Stok_Toko") {
                        obj["qty"] = row[index];
                    } else if (rawKey === "Update_Terakhir") {
                        obj["timestamp"] = row[index];
                    } else {
                        var key = rawKey.toLowerCase();
                        obj[key] = row[index];
                    }
                });

                // Injeksi parameter khusus CamelCase untuk kebutuhan mesin penyaring ViewHero
                obj["isAktif"] = "Aktif"; 
                obj["adsGlobal"] = parseFloat(obj["rata-rata penjualan harian"]) || 1; 
                obj["tren"] = "▲"; 
                
                return obj;
            });

            // Timpa memori data global menggunakan array objek yang sudah bersih
            globalData = articles;

            // Jalankan mesin penggambar tabel
            renderHeroAlert();
            console.log("Tabel dashboard ViewHero sukses dirender!");
            
        } else {
            if(artContainer) artContainer.innerHTML = '<div class="text-center py-5 text-danger">Data di Google Sheets kosong atau gagal dimuat.</div>';
        }
    }

    // FUNGSI PENGGAMBAR TABEL (DIPINDAHKAN KE INDEX AGAR SELALU TERSEDIA)
    function filterHeroAlert() {
      var input = document.getElementById('searchHero');
      var btn = document.getElementById('btnClearSearchHero');
      if (btn) {
        if (input && input.value.trim() !== "") {
          btn.style.setProperty('display', 'block', 'important');
        } else {
          btn.style.setProperty('display', 'none', 'important');
        }
      }
      renderHeroAlert();
    }

    function clearSearchHero() {
      var input = document.getElementById('searchHero');
      if (input) { input.value = ""; input.focus(); }
      var btn = document.getElementById('btnClearSearchHero');
      if (btn) btn.style.setProperty('display', 'none', 'important');
      renderHeroAlert();
    }

    function renderHeroAlert() {
      var tbody = document.getElementById('heroAlertBody');
      if(!tbody) return;
      
      var elDisp = document.getElementById('displayBufferHero');
      var elInput = document.getElementById('inputBufferHero');
      if (elDisp) {
        var heroDays = (elInput && elInput.value) ? elInput.value : 14;
        elDisp.innerText = heroDays + " Hari";
      }

      var searchInput = document.getElementById('searchHero');
      var searchHero = searchInput ? searchInput.value.toLowerCase() : "";
      
      var katInput = document.getElementById('filterKategoriHero');
      var katFilterHero = katInput ? katInput.value : "";
      
      var bufferInput = document.getElementById('inputBufferHero');
      var targetHari = bufferInput ? (parseFloat(bufferInput.value) || 14) : 14;
      
      var html = ""; var countTotal = 0; var countAman = 0; var countKritis = 0;
      var groupedData = {};
      
      // Memproses pencetakan data dari globalData objek array yang sudah bersih
      globalData.forEach(function(item) {
        if (!item || !item.sku) return;
        var sku = item.sku;
        
        if (!groupedData[sku]) {
          groupedData[sku] = {
            kategori: item.kategori,
            sku: sku,
            nama: item.nama,
            warna: item.warna,
            status: item.status,
            isAktif: item.isAktif,
            adsGlobal: parseFloat(item.adsGlobal) || 0,
            totalQty: 0,
            latestTimestamp: "-",
            sizes: []
          };
        }
        
        groupedData[sku].totalQty += parseInt(item.qty) || 0;
        groupedData[sku].sizes.push({ tren: item.tren });
        if(item.timestamp && item.timestamp !== "-") groupedData[sku].latestTimestamp = item.timestamp;
      });

      var heroArticles = Object.values(groupedData).filter(function(item) {
        var isHero = item.isAktif === "Aktif" && item.adsGlobal > 0;
        var matchSearch = item.nama.toLowerCase().includes(searchHero) || item.sku.toLowerCase().includes(searchHero);
        var matchKat = (katFilterHero === "") || (item.kategori === katFilterHero);
        return isHero && matchSearch && matchKat;
      });

      if(heroArticles.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted"><i class="fa-solid fa-box-open fa-2x mb-2"></i><br>Tidak ada data Hero Alert saat ini.</td></tr>';
        if(document.getElementById('heroCountTotal')) document.getElementById('heroCountTotal').innerText = "0";
        if(document.getElementById('heroCountAman')) document.getElementById('heroCountAman').innerText = "0";
        if(document.getElementById('heroCountKritis')) document.getElementById('heroCountKritis').innerText = "0";
        return;
      }

      var groupedByCategory = {};
      heroArticles.forEach(function(art) { 
        if(!groupedByCategory[art.kategori]) groupedByCategory[art.kategori] = []; 
        groupedByCategory[art.kategori].push(art); 
      });

      Object.keys(groupedByCategory).sort().forEach(function(kategori) {
        html += `<tr><td colspan="7" class="bg-light text-dark fw-bold text-uppercase border-bottom"><i class="fa-solid fa-tags me-2 text-primary"></i>Kategori: ${kategori}</td></tr>`;
        groupedByCategory[kategori].forEach(function(art) {
          countTotal++;
          var curQty = art.totalQty;
          var curAds = art.adsGlobal;
          
          var estimasiHari = curAds > 0 ? Math.floor(curQty / curAds) : 0;
          var isKritis = estimasiHari < targetHari;
          if(isKritis) countKritis++; else countAman++;
          
          var targetStokAman = curAds * targetHari;
          var selisih = curQty - targetStokAman; 
          
          var rowClass = isKritis ? 'table-danger' : 'table-success';
          var textStyle = isKritis ? 'text-danger fw-bold' : 'fw-bold text-success';
          var iconStatus = isKritis ? '<i class="fa-solid fa-triangle-exclamation text-danger"></i> Kritis' : '<i class="fa-solid fa-check-circle text-success"></i> Aman';
          
          var badgeSelisih = selisih < 0 
            ? `<span class="badge bg-danger ms-3"><i class="fa-solid fa-minus me-1"></i>${Math.abs(selisih)} pcs</span>` 
            : `<span class="badge bg-success ms-3"><i class="fa-solid fa-plus me-1"></i>+${selisih} pcs</span>`;

          html += `
            <tr class="${rowClass}">
              <td class="ps-3"><div class="fw-bold fs-6 text-dark">${art.nama}</div><div class="small text-muted font-monospace">${art.sku}</div></td>
              <td><span class="badge bg-white text-dark border p-2">${art.warna || '-'}</span></td>
              <td class="text-center fw-bold fs-4">${curQty}</td>
              <td class="align-middle"><div class="d-flex align-items-center"><div class="text-primary fw-bold fs-5">${curAds} <span class="small fw-normal text-muted">/hr</span></div>${badgeSelisih}</div></td>
              <td class="text-center ${textStyle} fs-5">${estimasiHari} Hr</td>
              <td class="text-center fw-bold">${iconStatus}</td>
              <td class="text-center align-middle"><span class="small text-muted">${art.latestTimestamp}</span></td>
            </tr>
          `;
        });
      });
      
      tbody.innerHTML = html;
      if(document.getElementById('heroCountTotal')) document.getElementById('heroCountTotal').innerText = countTotal;
      if(document.getElementById('heroCountAman')) document.getElementById('heroCountAman').innerText = countAman;
      if(document.getElementById('heroCountKritis')) document.getElementById('heroCountKritis').innerText = countKritis;
    }
  </script>
</body>
</html>
