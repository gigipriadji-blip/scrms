<body>

    <ul class="nav nav-tabs mb-4 pb-1 border-bottom border-2" id="mainTabs" role="tablist" style="font-size: 0.95rem;">

    <script>
      // Variabel Global Utama Aplikasi
      var globalData = [];
      var listKategoriGlobal = []; 
      var activeCategory = ""; 
      var groupedMaster = [];
      var GLOBAL_VENDOR_BUFFER = 7; 

      var APP_ROLE_MODE = "<?!= roleMode ?>";
      var TARGET_VENDOR_USER = "<?!= targetVendorUser ?>";
      var WEB_APP_BASE_URL = "";

      // Fungsi modular pemuat halaman HTML eksternal menggunakan Promise
      function loadPage(pageName, targetId) {
        return fetch(pageName + '.html')
          .then(response => response.text())
          .then(html => {
            var el = document.getElementById(targetId);
            if(el) el.innerHTML = html;
          })
          .catch(err => console.error("Gagal memuat komponen halaman: " + pageName, err));
      }

      // Menggunakan JSONP untuk menembus proteksi CORS Google secara aman
      function ambilDataDariGoogle() {
        var urlWebApp = "https://script.google.com/macros/s/AKfycbwSvzVtT4Xrl01yVfY_05_VY45zRv3KWADNpt2x7YBnNJ1aa483TsWdYO9--TnSYt79/exec?callback=handleGoogleSheetsData";
        
        var script = document.createElement('script');
        script.src = urlWebApp;
        document.body.appendChild(script);
      }

      // Fungsi penampung data yang dipanggil otomatis oleh JSONP setelah data sukses didapat
      function handleGoogleSheetsData(data) {
        if (data.error) {
          console.error("Gagal mengambil data dari Google:", data.error);
          return;
        }
        console.log("Data sukses diambil dari Google Sheets via JSONP:", data);
        globalData = data; 
        loadDashboardData();
      }
    </script>
  </div>

  <?!= include('ViewMaster_Modal'); ?>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script>
    // Antrean Sinkronisasi: Tunggu semua HTML siap nempel, baru ambil data dari Google Sheets
    window.addEventListener('DOMContentLoaded', function() {
      Promise.all([
        loadPage('ViewHero', 'content-Hero'),
        loadPage('ViewVendor', 'content-Vendor')
      ]).then(function() {
        console.log("Semua komponen tampilan HTML siap. Memulai penarikan data...");
        
        // Pemicu proteksi tampilan khusus jika masuk sebagai Vendor
        if (APP_ROLE_MODE === "vendor") {
            document.querySelectorAll('.menu-internal').forEach(el => el.remove());
            
            var pHe = document.getElementById('heroPage'); if(pHe) pHe.remove();
            var pMa = document.getElementById('masterPage'); if(pMa) pMa.remove();
            var pMg = document.getElementById('managePage'); if(pMg) pMg.remove();
            var pVm = document.getElementById('vendorManagePage'); if(pVm) pVm.remove();
            var pVn = document.getElementById('vendorMonitorPage'); if(pVn) pVn.remove();
            
            var welcomeHeader = document.getElementById('vendorWelcomeHeader');
            if(welcomeHeader) welcomeHeader.classList.remove('d-none');
            
            var dashPage = document.getElementById('dashPage');
            if(dashPage) dashPage.classList.add('show', 'active');
        }
        
        // Eksekusi utama penarikan data
        ambilDataDariGoogle();
      });
    });

    // Fungsi pemroses dan pemeta variabel dashboard utama
    function loadDashboardData() {
        var artContainer = document.getElementById('articlesContainer');
        if(artContainer) artContainer.innerHTML = '<div class="text-center py-5 text-muted"><i class="fa-solid fa-spinner fa-spin fa-3x mb-3"></i>Menyusun data katalog...</div>';

        if (globalData && globalData.length > 1) {
            var headers = globalData[0];
            var rows = globalData.slice(1);
            
            // Set kosong untuk menampung list kategori unik buat dropdown filter
            var kategoriSet = new Set();

            var articles = rows.map(function(row) {
                var obj = {};
                headers.forEach(function(header, index) {
                    var rawKey = header.toString().trim();
                    var key = rawKey.toLowerCase();
                    obj[key] = row[index];
                });

                // RE-MAPPING PRESISI 100% SESUAI STRUKTUR NYATA
                var itemKategori = obj["kode artikel"] || "Uncategorized";
                kategoriSet.add(itemKategori); // Masukkan ke daftar kategori dropdown

                var mappedObj = {
                    sku: obj["nama artikel"] || "",          // Kolom Kode SKU (LGS-TSR-82B)
                    nama: obj["warna"] || "",                // Nama Artikel (LEGEND TINY ON WHITE)
                    warna: "-",                              // Dikosongkan/strip sesuai versi awal jika tidak ada kolom khusus warna asli
                    kategori: itemKategori,                  // Kategori Baju (T SHIRT, JACKET, dll)
                    qty: parseInt(obj["stok_toko"] || obj["stok toko"]) || 0, // Otomatis cari kolom stok
                    timestamp: obj["update_terakhir"] || obj["update terakhir"] || "-", // Mencari tanggal update
                    isAktif: "Aktif",
                    // ADS Global: Mengambil nilai ADS asli dari sheet, jika tidak terbaca/0 ganti ke default aman (misal 2) agar pembagian tidak infinity
                    adsGlobal: parseFloat(obj["rata-rata penjualan harian"] || obj["ads_global"] || obj["ads"]) || 2,
                    tren: "▲"
                };

                // fallback proteksi indeks array murni jika header spasi gagal dibaca objek
                if(!mappedObj.qty) mappedObj.qty = parseInt(row[7]) || 0;
                if(mappedObj.timestamp === "-") mappedObj.timestamp = row[9] || "-";
                if(mappedObj.adsGlobal === 2) mappedObj.adsGlobal = parseFloat(row[5]) || 2;

                return mappedObj;
            });

            globalData = articles;

            // REGENERATE ISI DROPDOWN KATEGORI FILTER SECARA OTOMATIS
            var filterDropdown = document.getElementById('filterKategoriHero');
            if (filterDropdown) {
                var dropdownHtml = '<option value="">Semua Kategori</option>';
                Array.from(kategoriSet).sort().forEach(function(kat) {
                    dropdownHtml += `<option value="${kat}">${kat}</option>`;
                });
                filterDropdown.innerHTML = dropdownHtml;
            }

            // Jalankan mesin penggambar tabel
            renderHeroAlert();
            console.log("Tabel dashboard ViewHero sukses dirender dengan pemetaan presisi!");
            
        } else {
            if(artContainer) artContainer.innerHTML = '<div class="text-center py-5 text-danger">Data di Google Sheets kosong atau gagal dimuat.</div>';
        }
    }

    // FUNGSI PENGGAMBAR TABEL (DIPASTIKAN MENGIKUTI VISUAL GAMBAR 2 & 3)
    function filterHeroAlert() {
      renderHeroAlert();
    }

    function clearSearchHero() {
      var input = document.getElementById('searchHero');
      if (input) { input.value = ""; input.focus(); }
      var btn = document.getElementById('btnClearSearchHero');
      if (btn) btn.style.setProperty('display', 'none', 'important');
      renderHeroAlert();
    }

    function renderHeroAlert() {
      var tbody = document.getElementById('heroAlertBody');
      if(!tbody) return;
      
      var targetHari = 7;
      var bufferInput = document.getElementById('inputBufferHero');
      if (bufferInput && bufferInput.value) {
        targetHari = parseFloat(bufferInput.value) || 7;
      }
      
      var elDisp = document.getElementById('displayBufferHero');
      if (elDisp) elDisp.innerText = targetHari + " Hari";

      var searchInput = document.getElementById('searchHero');
      var searchHero = searchInput ? searchInput.value.toLowerCase() : "";
      
      var katInput = document.getElementById('filterKategoriHero');
      var katFilterHero = katInput ? katInput.value : "";
      
      var html = ""; var countTotal = 0; var countAman = 0; var countKritis = 0;
      var groupedData = {};
      
      globalData.forEach(function(item) {
        if (!item || !item.sku) return;
        var sku = item.sku;
        
        if (!groupedData[sku]) {
          groupedData[sku] = {
            kategori: item.kategori,
            sku: sku,
            nama: item.nama,
            warna: item.warna,
            adsGlobal: item.adsGlobal,
            totalQty: 0,
            latestTimestamp: item.timestamp
          };
        }
        groupedData[sku].totalQty += item.qty;
        if(item.timestamp && item.timestamp !== "-") groupedData[sku].latestTimestamp = item.timestamp;
      });

      var heroArticles = Object.values(groupedData).filter(function(item) {
        var matchSearch = item.nama.toLowerCase().includes(searchHero) || item.sku.toLowerCase().includes(searchHero);
        var matchKat = (katFilterHero === "") || (item.kategori === katFilterHero);
        return matchSearch && matchKat;
      });

      if(heroArticles.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted"><i class="fa-solid fa-box-open fa-2x mb-2"></i><br>Tidak ada data Hero Alert saat ini.</td></tr>';
        return;
      }

      var groupedByCategory = {};
      heroArticles.forEach(function(art) { 
        if(!groupedByCategory[art.kategori]) groupedByCategory[art.kategori] = []; 
        groupedByCategory[art.kategori].push(art); 
      });

      Object.keys(groupedByCategory).sort().forEach(function(kategori) {
        html += `<tr><td colspan="7" class="bg-light text-dark fw-bold text-uppercase border-bottom py-2" style="font-size:0.85rem;"><i class="fa-solid fa-tags me-2 text-primary"></i>Kategori: ${kategori}</td></tr>`;
        
        groupedByCategory[kategori].forEach(function(art) {
          countTotal++;
          var curQty = art.totalQty;
          var curAds = art.adsGlobal;
          
          var estimasiHari = curAds > 0 ? Math.floor(curQty / curAds) : 0;
          var isKritis = estimasiHari < targetHari;
          if(isKritis) countKritis++; else countAman++;
          
          var targetStokAman = Math.ceil(curAds * targetHari);
          var selisih = curQty - targetStokAman; 
          
          var badgeStatus = isKritis 
            ? `<span class="badge bg-danger px-2 py-1"><i class="fa-solid fa-triangle-exclamation me-1"></i>Kritis</span>` 
            : `<span class="badge bg-success px-2 py-1"><i class="fa-solid fa-check me-1"></i>Aman</span>`;
          
          var badgeSelisih = selisih < 0 
            ? `<span class="badge bg-light text-danger border border-danger ms-2"><i class="fa-solid fa-arrow-down me-1"></i>${Math.abs(selisih)}</span>` 
            : `<span class="badge bg-light text-success border border-success ms-2"><i class="fa-solid fa-arrow-up me-1"></i>+${selisih}</span>`;

          var tglJam = art.latestTimestamp.split(" ");
          var tglStr = tglJam[0] || "-";
          var jamStr = tglJam[1] || "";

          html += `
            <tr>
              <td class="ps-3"><div class="fw-bold text-dark" style="font-size:0.9rem;">${art.nama}</div><div class="small text-muted font-monospace" style="font-size:0.75rem;">${art.sku}</div></td>
              <td><span class="badge bg-white text-dark border p-2" style="font-size:0.8rem;">${art.warna}</span></td>
              <td class="text-center fw-bold fs-5">${curQty} <span class="text-success small" style="font-size:0.75rem;">▲</span></td>
              <td class="align-middle"><div class="d-flex align-items-center"><div class="text-dark fw-bold">${curAds} <span class="small fw-normal text-muted">/hr</span></div>${badgeSelisih}</div></td>
              <td class="text-center fw-bold fs-5 text-dark">${estimasiHari} Hr</td>
              <td class="text-center align-middle">${badgeStatus}</td>
              <td class="text-center align-middle">
                <div class="d-inline-flex align-items-center gap-1 px-2 py-1 bg-light rounded border text-nowrap" style="font-size: 0.75rem;">
                  <span class="text-dark fw-bold"><i class="fa-regular fa-calendar-check text-muted me-1"></i>${tglStr}</span>
                  ${jamStr ? `<span class="text-muted">|</span><span class="text-primary fw-bold"><i class="fa-regular fa-clock text-muted me-1"></i>${jamStr}</span>` : ''}
                </div>
              </td>
            </tr>
          `;
        });
      });
      
      tbody.innerHTML = html;
      if(document.getElementById('heroCountTotal')) document.getElementById('heroCountTotal').innerText = countTotal;
      if(document.getElementById('heroCountAman')) document.getElementById('heroCountAman').innerText = countAman;
      if(document.getElementById('heroCountKritis')) document.getElementById('heroCountKritis').innerText = countKritis;
    }
  </script>
</body>
